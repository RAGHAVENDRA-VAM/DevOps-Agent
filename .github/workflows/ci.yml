name: CI/CD Pipeline
'on':
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      run: rm -rf node_modules && npm install
    - name: Build
      run: npm run build
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-artifact
        path: frontend/dist/
        retention-days: 7
    defaults:
      run:
        working-directory: frontend
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && needs.build.result == 'success'
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: build-artifact
        path: dist
    - name: Zip artifact
      run: cd dist && zip -r ../release.zip . && cd ..
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Provision Resource Group
      run: az group create --name vsd --location eastus
    - name: Provision App Service Plan
      run: az appservice plan create --name ${{ secrets.AZURE_WEBAPP_NAME }}-plan
        --resource-group vsd --sku B1 --is-linux
    - name: Provision Web App
      run: az webapp create --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group
        vsd --plan ${{ secrets.AZURE_WEBAPP_NAME }}-plan --runtime 'NODE:20-lts'
    - name: Set startup command
      run: az webapp config set --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group
        vsd --startup-file 'npm start'
    - name: Deploy to Azure Web App
      run: az webapp deploy --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group
        vsd --src-path release.zip --type zip
